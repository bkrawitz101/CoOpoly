<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoOpoly - Infinite Board</title>
    <style>
        :root {
            --board-size: 85vmin; 
        }

        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: #080808;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            background-image: 
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 80px 70px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 150px 160px, rgba(255,255,255,0.6), transparent);
            background-size: 200px 200px;
        }

        #vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.95) 100%);
            z-index: 100; pointer-events: none; opacity: 0; transition: opacity 1.8s ease-in-out;
        }

        /* 3D Camera System */
        #world {
            position: absolute; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px; z-index: 10;
        }

        #camera-rig {
            position: absolute; transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
            transform: scale(1) rotateX(0deg);
            will-change: transform;
        }

        #board-mover {
            position: absolute; transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
            transform: rotateZ(0deg) translate(0px, 0px);
            will-change: transform;
        }

        #layers-container {
            position: absolute; transform-style: preserve-3d;
            width: 0; height: 0;
            display: flex; justify-content: center; align-items: center;
        }

        .layer {
            position: absolute;
            left: calc(var(--board-size) / -2);
            top: calc(var(--board-size) / -2);
            width: var(--board-size); height: var(--board-size);
            transform-style: preserve-3d;
            transform-origin: center center;
            will-change: transform, opacity;
        }

        /* ----- ROOT BOARD ----- */
        .root-board {
            position: absolute; width: 100%; height: 100%; left: 0; top: 0;
            display: grid;
            grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr;
            background-color: #fafaf0;
            border: 2px solid #111;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
            box-sizing: border-box;
            transform-style: preserve-3d;
        }

        .space, .corner {
            outline: 1px solid #111; box-sizing: border-box;
            display: flex; position: relative; justify-content: center; align-items: center;
            cursor: pointer; transition: background-color 0.2s, box-shadow 0.2s;
            transform-style: preserve-3d;
        }

        .space:hover, .corner:hover {
            box-shadow: inset 0 0 40px rgba(0, 210, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.9);
            z-index: 5;
        }

        .color-bar { pointer-events: none; z-index: 5; }

        .root-center {
            grid-column: 2 / 11; grid-row: 2 / 11;
            background-color: #cde6d0; outline: 1px solid #111;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            padding-bottom: 5vmin; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
            position: relative;
            transform-style: preserve-3d;
        }

        /* ----- REAL-TIME CANVAS WRAPPERS ----- */
        .root-avatar-wrapper {
            position: absolute;
            bottom: 45%; 
            width: 35vmin; 
            height: 45vmin; 
            pointer-events: none;
            transform: translateZ(2px) rotateX(-15deg);
            transform-origin: bottom center;
            z-index: 50;
        }

        .card-avatar-wrapper {
            position: absolute;
            bottom: 12%; 
            right: 2%; 
            width: 28vmin; 
            height: 40vmin; 
            pointer-events: none;
            transform: translateZ(10px) rotateX(-15deg);
            transform-origin: bottom center;
            z-index: 50; 
        }

        /* The canvas cleanly projecting the video without CSS 3D bugs */
        .hologram-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.4));
        }

        /* 
           CRITICAL FIX: 
           Never use display: none! It stops browsers from processing the video.
           Push it offscreen so it plays, but hides perfectly.
        */
        .hologram-video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -9999px;
            left: -9999px;
            display: block;
        }

        /* Start Audio Button Overlay */
        #audio-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; font-size: 1.5rem;
            backdrop-filter: blur(10px);
        }

        #start-btn {
            margin-top: 20px;
            background-color: #00d2ff;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
            transition: all 0.2s;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 210, 255, 1);
        }

        /* ----- FRACTAL MONOPOLY CARD ----- */
        .monopoly-card {
            position: absolute; width: 100%; height: 100%; left: 0; top: 0;
            background: #fafaf0; border: 4px solid #111; border-radius: 8px;
            display: flex; flex-direction: column;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.05);
            box-sizing: border-box; overflow: hidden;
            transform-style: preserve-3d;
            user-select: none;
        }

        .card-color-bar {
            height: 16%; background-color: var(--theme-color);
            border-bottom: 4px solid #111;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2);
        }

        .card-title {
            height: 14%; display: flex; justify-content: center; align-items: center;
            color: #111; font-size: 2.2rem; text-transform: uppercase; font-weight: 900;
            letter-spacing: 2px; border-bottom: 2px solid #ccc; text-align: center;
        }

        .card-grid {
            height: 70%; padding: 1.5vmin;
            display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 1.2vmin;
            transform-style: preserve-3d; background: #ddd; 
        }

        .sub-cell {
            background: #fff; border: 2px solid #111; border-radius: 4px;
            display: flex; flex-direction: column; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden; transform-style: preserve-3d;
        }

        .sub-cell:hover {
            transform: scale(1.05) translateZ(10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2), inset 0 0 20px var(--theme-color);
            border-color: var(--theme-color); z-index: 10;
        }

        .sub-color-bar {
            height: 25%; background-color: var(--theme-color);
            border-bottom: 2px solid #111;
        }

        .sub-name {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-weight: 800; color: #111; font-size: 1.2rem; text-align: center; padding: 5px;
        }

        .card-center-ui {
            grid-column: 2; grid-row: 2;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.9); border-radius: 4px; border: 2px dashed #aaa;
        }

        /* ----- SHARED CONTROLS ----- */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 60;}
        .button-row { display: flex; gap: 10px; }

        button {
            background-color: #111; color: #fff;
            border: 2px solid #444; padding: 10px 20px;
            font-size: 1.1rem; font-weight: bold; border-radius: 4px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button:hover { background-color: #00d2ff; color: #000; border-color: #00d2ff; transform: translateY(-2px);}
        button:disabled { border-color: #ccc; color: #aaa; cursor: not-allowed; background: #eee; box-shadow: none; transform: none;}

        .depth-display {
            font-family: monospace; font-size: 1.5rem; font-weight: bold; color: #111;
            background: rgba(255,255,255,0.8); padding: 6px 16px; border-radius: 4px; border: 2px solid #888;
        }

        .root-center h2 { margin: 0 0 5px 0; font-size: 3.5rem; color: #111; text-transform: uppercase; letter-spacing: 2px;}

        .top-row { flex-direction: column-reverse; } .top-row .color-bar { border-top: 2px solid #111; height: 25%; width: 100%; position: absolute; top: 0; }
        .bottom-row { flex-direction: column; } .bottom-row .color-bar { border-bottom: 2px solid #111; height: 25%; width: 100%; position: absolute; bottom: 0; }
        .left-row { flex-direction: row-reverse; } .left-row .color-bar { border-left: 2px solid #111; width: 25%; height: 100%; position: absolute; left: 0; }
        .right-row { flex-direction: row; } .right-row .color-bar { border-right: 2px solid #111; width: 25%; height: 100%; position: absolute; right: 0; }

        .c-blue .color-bar { background-color: #87CEEB; }
        .c-indigo .color-bar { background-color: #4B0082; }
        .c-purple .color-bar { background-color: #800080; }
        .c-magenta .color-bar { background-color: #FF00FF; }
        .c-red .color-bar { background-color: #FF0000; }
        .c-orange .color-bar { background-color: #FFA500; }
        .c-yellow .color-bar { background-color: #FFD700; }
        .c-green .color-bar { background-color: #008000; }

    </style>
</head>
<body>

    <div id="audio-overlay">
        <div>Welcome to CoOpoly</div>
        <button id="start-btn">Enter Dimension</button>
    </div>

    <div id="vignette"></div>

    <div id="world">
        <div id="camera-rig">
            <div id="board-mover">
                <div id="layers-container">
                    <div class="layer" id="layer-0"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cameraRig = document.getElementById('camera-rig');
        const boardMover = document.getElementById('board-mover');
        const layersContainer = document.getElementById('layers-container');
        const vignette = document.getElementById('vignette');

        const audioOverlay = document.getElementById('audio-overlay');
        const startBtn = document.getElementById('start-btn');

        let layerStack = []; 
        let currentDepth = 0;
        let isAnimating = false;

        const animDuration = 1.8; 
        const TILT_ANGLE = 15; 

        // ----- STREAMLINED CANVAS RENDERING (CORS-SAFE) -----
        function setupCanvasProcessing(videoElement, canvasElement) {
            const ctx = canvasElement.getContext('2d');

            const drawFrame = () => {
                if (videoElement.paused || videoElement.ended) return;

                if (canvasElement.width !== videoElement.videoWidth) {
                    canvasElement.width = videoElement.videoWidth || 800;
                    canvasElement.height = videoElement.videoHeight || 1000;
                }

                if (videoElement.videoWidth > 0) {
                    // We simply clear the canvas and draw the raw video frame.
                    // This bypasses the local file "CORS Taint" error entirely!
                    ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                    ctx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                }

                requestAnimationFrame(drawFrame);
            };

            videoElement.addEventListener('play', () => {
                requestAnimationFrame(drawFrame);
            });
        }


        startBtn.addEventListener('click', () => {
            const rootVideo = document.querySelector('#layer-0 .hologram-video');
            if (rootVideo) {
                rootVideo.muted = false;
                rootVideo.currentTime = 0;
                rootVideo.play().catch(e => console.log("Video play failed:", e));
            }

            audioOverlay.style.transition = "opacity 0.8s ease";
            audioOverlay.style.opacity = "0";
            setTimeout(() => {
                audioOverlay.remove();
            }, 800);
        });

        function getControlsHTML(depth) {
            const isDisabled = depth === 0 ? "disabled" : "";
            return `
                <div class="controls">
                    <div class="depth-display">Depth: ${depth}</div>
                    <div class="button-row">
                        <button onclick="ascend(event)" ${isDisabled}>Ascend</button>
                        <button onclick="returnHome(event)" ${isDisabled}>Root</button>
                    </div>
                </div>
            `;
        }

        function createRootBoardHTML() {
            let html = `<div class="root-board">`;
            const map = {
                blue: { c: '#87CEEB', n: 'Blue Prop', cls: 'c-blue' },
                indigo: { c: '#4B0082', n: 'Indigo Prop', cls: 'c-indigo' },
                purple: { c: '#800080', n: 'Purple Prop', cls: 'c-purple' },
                magenta: { c: '#FF00FF', n: 'Magenta Prop', cls: 'c-magenta' },
                red: { c: '#FF0000', n: 'Red Prop', cls: 'c-red' },
                orange: { c: '#FFA500', n: 'Orange Prop', cls: 'c-orange' },
                yellow: { c: '#FFD700', n: 'Yellow Prop', cls: 'c-yellow' },
                green: { c: '#008000', n: 'Green Prop', cls: 'c-green' },
                corner: { c: '#ffffff', n: 'Corner', cls: '' },
                empty: { c: '#aaaaaa', n: 'Action', cls: '' }
            };

            html += `<div class="corner space-node" data-name="Free Parking" data-color="${map.corner.c}" data-ang="0" style="grid-column: 1; grid-row: 1;"></div>`;
            const topProps = [map.blue, map.empty, map.blue, map.blue, map.empty, map.indigo, map.indigo, map.empty, map.indigo];
            for(let i=2; i<=10; i++) {
                let clr = topProps[i-2];
                let bar = clr === map.empty ? '' : `<div class="color-bar"></div>`;
                html += `<div class="space top-row space-node ${clr.cls}" data-name="${clr.n} ${i}" data-color="${clr.c}" data-ang="0" style="grid-column: ${i};">${bar}</div>`;
            }
            html += `<div class="corner space-node" data-name="Go To Jail" data-color="${map.corner.c}" data-ang="0" style="grid-column: 11; grid-row: 1;"></div>`;

            const leftProps = [map.green, map.green, map.empty, map.green, map.empty, map.yellow, map.yellow, map.empty, map.yellow];
            for(let i=2; i<=10; i++) {
                let clr = leftProps[i-2];
                let bar = clr === map.empty ? '' : `<div class="color-bar"></div>`;
                html += `<div class="space left-row space-node ${clr.cls}" data-name="${clr.n} ${i}" data-color="${clr.c}" data-ang="90" style="grid-column: 1; grid-row: ${i};">${bar}</div>`;
            }

            const rightProps = [map.purple, map.purple, map.empty, map.purple, map.empty, map.empty, map.magenta, map.empty, map.magenta];
            for(let i=2; i<=10; i++) {
                let clr = rightProps[i-2];
                let bar = clr === map.empty ? '' : `<div class="color-bar"></div>`;
                html += `<div class="space right-row space-node ${clr.cls}" data-name="${clr.n} ${i}" data-color="${clr.c}" data-ang="-90" style="grid-column: 11; grid-row: ${i};">${bar}</div>`;
            }

            html += `<div class="corner space-node" data-name="Jail" data-color="${map.corner.c}" data-ang="0" style="grid-column: 1; grid-row: 11;"></div>`;
            const bottomProps = [map.orange, map.orange, map.empty, map.orange, map.empty, map.empty, map.red, map.empty, map.red];
            for(let i=2; i<=10; i++) {
                let clr = bottomProps[i-2];
                let bar = clr === map.empty ? '' : `<div class="color-bar"></div>`;
                html += `<div class="space bottom-row space-node ${clr.cls}" data-name="${clr.n} ${i}" data-color="${clr.c}" data-ang="180" style="grid-column: ${i}; grid-row: 11;">${bar}</div>`;
            }
            html += `<div class="corner space-node" data-name="GO" data-color="${map.corner.c}" data-ang="0" style="grid-column: 11; grid-row: 11;"></div>`;

            html += `
                <div class="root-center">

                    <div class="root-avatar-wrapper">
                        <canvas class="hologram-canvas"></canvas>
                        <video class="hologram-video" loop playsinline muted>
                            <source src="your-avatar.mov" type="video/quicktime; codecs=hvc1">
                            <source src="your-avatar.webm" type="video/webm">
                        </video>
                    </div>

                    <h2>CoOpoly</h2>
                    ${getControlsHTML(currentDepth)}
                </div>
            </div>`;
            return html;
        }

        function getCardContentHTML(parentName, parentColor, depth) {
            let html = `
                <div class="monopoly-card" style="--theme-color: ${parentColor};">

                    <div class="card-avatar-wrapper">
                        <canvas class="hologram-canvas"></canvas>
                        <video class="hologram-video" loop playsinline muted>
                            <source src="your-avatar.mov" type="video/quicktime; codecs=hvc1">
                            <source src="your-avatar.webm" type="video/webm">
                        </video>
                    </div>

                    <div class="card-color-bar"></div>
                    <div class="card-title">${parentName}</div>
                    <div class="card-grid">
            `;
            let sectionCount = 1;
            for(let row = 1; row <= 3; row++) {
                for(let col = 1; col <= 3; col++) {
                    if (row === 2 && col === 2) {
                        html += `<div class="card-center-ui">${getControlsHTML(depth)}</div>`;
                    } else {
                        const subName = `Sector ${sectionCount}`;
                        html += `
                            <div class="sub-cell space-node" data-name="${parentName} S${sectionCount}" data-color="${parentColor}" data-ang="0">
                                <div class="sub-color-bar"></div>
                                <div class="sub-name">${subName}</div>
                            </div>
                        `;
                        sectionCount++;
                    }
                }
            }
            html += `       </div>
                </div>`;
            return html;
        }

        function bindSpaces(layerElement, depth) {
            const nodes = layerElement.querySelectorAll('.space-node');

            // Connect the hidden video to the visible canvas for this layer
            const videoElem = layerElement.querySelector('.hologram-video');
            const canvasElem = layerElement.querySelector('.hologram-canvas');
            if (videoElem && canvasElem) {
                setupCanvasProcessing(videoElem, canvasElem);
            }

            nodes.forEach(node => {
                node.addEventListener('click', function(e) {
                    e.stopPropagation(); 
                    if (isAnimating) return;
                    isAnimating = true;

                    const currentLayerObj = layerStack[layerStack.length - 1];
                    const currentVideo = currentLayerObj.el.querySelector('.hologram-video');
                    if (currentVideo) currentVideo.pause();

                    const diff = parseFloat(this.getAttribute('data-ang') || 0);

                    const oldRig = cameraRig.style.transform;
                    cameraRig.style.transform = 'none';

                    const layerRect = layerElement.getBoundingClientRect();
                    const cellRect = this.getBoundingClientRect();

                    const cx = (cellRect.left - layerRect.left) + cellRect.width / 2;
                    const cy = (cellRect.top - layerRect.top) + cellRect.height / 2;
                    const localX = cx - layerRect.width / 2;
                    const localY = cy - layerRect.height / 2;

                    const maxSize = Math.max(cellRect.width, cellRect.height);
                    const dynamicS = layerRect.width / maxSize;

                    cameraRig.style.transform = oldRig;

                    const cellName = this.getAttribute('data-name') || "Node";
                    const cellColor = this.getAttribute('data-color') || "#ccc";
                    const newDepth = depth + 1;

                    const newLayer = document.createElement('div');
                    newLayer.className = 'layer';
                    newLayer.id = `layer-${newDepth}`;
                    newLayer.innerHTML = getCardContentHTML(cellName, cellColor, newDepth);

                    newLayer.style.transform = `translate(${localX}px, ${localY}px) rotateZ(${-diff}deg) scale(${1/dynamicS})`;
                    layersContainer.appendChild(newLayer);

                    const newVideo = newLayer.querySelector('.hologram-video');
                    const newCanvas = newLayer.querySelector('.hologram-canvas');

                    if (newVideo && newCanvas) {
                        setupCanvasProcessing(newVideo, newCanvas);
                        newVideo.muted = false;
                        newVideo.currentTime = 0;
                        newVideo.play().catch(e => console.log("Audio bypass error:", e));
                    }

                    void layersContainer.offsetWidth; 

                    vignette.style.opacity = '1';

                    boardMover.style.transition = `transform ${animDuration}s cubic-bezier(0.65, 0, 0.35, 1)`;
                    boardMover.style.transform = `rotateZ(${diff}deg) translate(${-localX}px, ${-localY}px)`;

                    cameraRig.style.transition = `transform ${animDuration}s cubic-bezier(0.65, 0, 0.35, 1)`;
                    cameraRig.style.transform = `scale(${dynamicS}) rotateX(${TILT_ANGLE}deg)`;

                    currentLayerObj.el.style.transition = `opacity ${animDuration * 0.8}s ease-in`;
                    currentLayerObj.el.style.opacity = '0';

                    setTimeout(() => {
                        currentLayerObj.el.style.display = 'none';

                        boardMover.style.transition = 'none';
                        boardMover.style.transform = `translate(0px, 0px) rotateZ(0deg)`;

                        cameraRig.style.transition = 'none';
                        cameraRig.style.transform = `scale(1) rotateX(${TILT_ANGLE}deg)`;

                        newLayer.style.transition = 'none';
                        newLayer.style.transform = `translate(0px, 0px) rotateZ(0deg) scale(1)`;

                        layerStack.push({ el: newLayer, cx: localX, cy: localY, diff: diff, scale: dynamicS });
                        currentDepth = newDepth;
                        bindSpaces(newLayer, newDepth); 

                        vignette.style.opacity = '0';
                        isAnimating = false;
                    }, animDuration * 1000); 
                });
            });
        }

        window.ascend = function(e) {
            e.stopPropagation();
            if (isAnimating || currentDepth <= 0) return;
            isAnimating = true;

            const currentState = layerStack.pop(); 
            const parentState = layerStack[layerStack.length - 1]; 

            const currentVideo = currentState.el.querySelector('.hologram-video');
            if (currentVideo) currentVideo.pause();

            parentState.el.style.display = 'block';
            parentState.el.style.opacity = '0';

            boardMover.style.transition = 'none';
            boardMover.style.transform = `rotateZ(${currentState.diff}deg) translate(${-currentState.cx}px, ${-currentState.cy}px)`;

            cameraRig.style.transition = 'none';
            cameraRig.style.transform = `scale(${currentState.scale}) rotateX(${TILT_ANGLE}deg)`;

            currentState.el.style.transition = 'none';
            currentState.el.style.transform = `translate(${currentState.cx}px, ${currentState.cy}px) rotateZ(${-currentState.diff}deg) scale(${1/currentState.scale})`;

            void layersContainer.offsetWidth; 

            vignette.style.opacity = '1';

            boardMover.style.transition = `transform ${animDuration}s cubic-bezier(0.65, 0, 0.35, 1)`;
            boardMover.style.transform = `translate(0px, 0px) rotateZ(0deg)`;

            const isRoot = currentDepth - 1 === 0;
            cameraRig.style.transition = `transform ${animDuration}s cubic-bezier(0.65, 0, 0.35, 1)`;
            cameraRig.style.transform = `scale(1) rotateX(${isRoot ? 0 : TILT_ANGLE}deg)`;

            currentState.el.style.transition = `opacity ${animDuration * 0.8}s ease-in`;
            currentState.el.style.opacity = '0';

            parentState.el.style.transition = `opacity ${animDuration * 0.7}s ease-out ${animDuration * 0.3}s`;
            parentState.el.style.opacity = '1';

            const parentVideo = parentState.el.querySelector('.hologram-video');
            if (parentVideo) parentVideo.play();

            setTimeout(() => {
                currentState.el.remove();
                currentDepth--;
                vignette.style.opacity = '0';
                isAnimating = false;
            }, animDuration * 1000);
        }

        window.returnHome = function(e) {
            e.stopPropagation();
            if (isAnimating || currentDepth <= 0) return;
            isAnimating = true;

            const currentState = layerStack.pop();
            const rootState = layerStack[0];

            const currentVideo = currentState.el.querySelector('.hologram-video');
            if (currentVideo) currentVideo.pause();

            for(let i = 1; i < layerStack.length; i++) {
                layerStack[i].el.remove();
            }
            layerStack = [rootState];

            const warpSpeed = 1.2;

            rootState.el.style.display = 'block';
            rootState.el.style.opacity = '0';

            boardMover.style.transition = 'none';
            boardMover.style.transform = `translate(0px, 0px) rotateZ(0deg)`;

            cameraRig.style.transition = 'none';
            cameraRig.style.transform = `scale(0.1) rotateX(0deg)`;

            currentState.el.style.transition = 'none';
            currentState.el.style.transform = `translate(0px, 0px) rotateZ(0deg) scale(1)`;

            void layersContainer.offsetWidth;

            vignette.style.opacity = '1';

            cameraRig.style.transition = `transform ${warpSpeed}s cubic-bezier(0.5, 0, 0.5, 1)`;
            cameraRig.style.transform = `scale(1) rotateX(0deg)`;

            currentState.el.style.transition = `opacity ${warpSpeed * 0.8}s ease-in`;
            currentState.el.style.opacity = '0';

            rootState.el.style.transition = `opacity ${warpSpeed * 0.7}s ease-out ${warpSpeed * 0.3}s`;
            rootState.el.style.opacity = '1';

            const rootVideo = rootState.el.querySelector('.hologram-video');
            if (rootVideo) rootVideo.play();

            setTimeout(() => {
                currentState.el.remove();
                currentDepth = 0;
                vignette.style.opacity = '0';
                isAnimating = false;
            }, warpSpeed * 1000);
        }

        const initRootLayer = document.getElementById('layer-0');
        initRootLayer.innerHTML = createRootBoardHTML();
        layerStack.push({ el: initRootLayer, cx: 0, cy: 0, diff: 0, scale: 1 });

        const initVideo = initRootLayer.querySelector('.hologram-video');
        const initCanvas = initRootLayer.querySelector('.hologram-canvas');
        setupCanvasProcessing(initVideo, initCanvas);
        bindSpaces(initRootLayer, 0);

    </script>
</body>
</html>
