<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X The Game - Mandelbrot Fluid Zoom</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        /* The Camera handles the mathematical panning and scaling */
        #camera {
            position: absolute;
            width: 100vw;
            height: 100vh;
            transform-origin: center center;
            will-change: transform;
            /* Flex layout ensures layers inside are perfectly centered at (0,0) by default */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Each Layer holds one full Board */
        .layer {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        .board {
            position: absolute;
            display: grid;
            grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr;
            width: 90vmin;
            height: 90vmin;
            background-color: #fafaf0;
            border: 2px solid #111;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            will-change: transform, opacity;
        }

        /* Spaces */
        .space, .corner {
            outline: 1px solid #111;
            box-sizing: border-box;
            display: flex;
            position: relative;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease-out, background-color 0.2s;
        }

        .space:hover, .corner:hover {
            transform: scale(1.05);
            z-index: 50;
            background-color: #fff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            outline: 3px solid #3498db;
        }

        .color-bar { pointer-events: none; }

        /* Center UI Panel */
        .center {
            grid-column: 2 / 11;
            grid-row: 2 / 11;
            background-color: #cde6d0;
            outline: 1px solid #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 1;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
        }

        .ui-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: #333;
        }

        h2 { margin: 0 0 5px 0; color: #111; font-weight: 800;}
        .subtitle { font-size: 0.9rem; color: #444; margin-bottom: 20px; font-weight: bold;}

        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        button:hover { background-color: #e74c3c; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        #layer-counter { font-size: 1.2rem; margin-top: 10px; font-family: monospace; font-weight: bold; color: #222; }

        /* Orientation & Color Bars */
        .top-row { flex-direction: column-reverse; }
        .top-row .color-bar { border-top: 2px solid #111; height: 25%; width: 100%; position: absolute; top: 0; }
        .bottom-row { flex-direction: column; }
        .bottom-row .color-bar { border-bottom: 2px solid #111; height: 25%; width: 100%; position: absolute; bottom: 0; }
        .left-row { flex-direction: row-reverse; }
        .left-row .color-bar { border-left: 2px solid #111; width: 25%; height: 100%; position: absolute; left: 0; }
        .right-row { flex-direction: row; }
        .right-row .color-bar { border-right: 2px solid #111; width: 25%; height: 100%; position: absolute; right: 0; }

        /* Restored Original Colors */
        .brown { background-color: #8B4513 !important; } 
        .lightblue { background-color: #87CEEB !important; }
        .pink { background-color: #FF1493 !important; } 
        .orange { background-color: #FFA500 !important; }
        .red { background-color: #FF0000 !important; } 
        .yellow { background-color: #FFD700 !important; }
        .green { background-color: #008000 !important; } 
        .darkblue { background-color: #00008B !important; }

        /* Deep Speed Vignette */
        #vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.95) 100%);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

    </style>
</head>
<body>

    <div id="vignette"></div>

    <div id="camera">
        <div class="layer" id="active-layer">
            <div class="board" id="active-board">
                <!-- Top Row -->
                <div class="corner" style="grid-column: 1; grid-row: 1;"></div>
                <div class="space top-row" style="grid-column: 2;"><div class="color-bar red"></div></div>
                <div class="space top-row" style="grid-column: 3;"></div>
                <div class="space top-row" style="grid-column: 4;"><div class="color-bar red"></div></div>
                <div class="space top-row" style="grid-column: 5;"><div class="color-bar red"></div></div>
                <div class="space top-row" style="grid-column: 6;"></div>
                <div class="space top-row" style="grid-column: 7;"><div class="color-bar yellow"></div></div>
                <div class="space top-row" style="grid-column: 8;"><div class="color-bar yellow"></div></div>
                <div class="space top-row" style="grid-column: 9;"></div>
                <div class="space top-row" style="grid-column: 10;"><div class="color-bar yellow"></div></div>
                <div class="corner" style="grid-column: 11; grid-row: 1;"></div>

                <!-- Left Row -->
                <div class="space left-row" style="grid-column: 1; grid-row: 2;"><div class="color-bar orange"></div></div>
                <div class="space left-row" style="grid-column: 1; grid-row: 3;"><div class="color-bar orange"></div></div>
                <div class="space left-row" style="grid-column: 1; grid-row: 4;"></div>
                <div class="space left-row" style="grid-column: 1; grid-row: 5;"><div class="color-bar orange"></div></div>
                <div class="space left-row" style="grid-column: 1; grid-row: 6;"></div>
                <div class="space left-row" style="grid-column: 1; grid-row: 7;"><div class="color-bar pink"></div></div>
                <div class="space left-row" style="grid-column: 1; grid-row: 8;"><div class="color-bar pink"></div></div>
                <div class="space left-row" style="grid-column: 1; grid-row: 9;"></div>
                <div class="space left-row" style="grid-column: 1; grid-row: 10;"><div class="color-bar pink"></div></div>

                <!-- Right Row -->
                <div class="space right-row" style="grid-column: 11; grid-row: 2;"><div class="color-bar green"></div></div>
                <div class="space right-row" style="grid-column: 11; grid-row: 3;"><div class="color-bar green"></div></div>
                <div class="space right-row" style="grid-column: 11; grid-row: 4;"></div>
                <div class="space right-row" style="grid-column: 11; grid-row: 5;"><div class="color-bar green"></div></div>
                <div class="space right-row" style="grid-column: 11; grid-row: 6;"></div>
                <div class="space right-row" style="grid-column: 11; grid-row: 7;"></div>
                <div class="space right-row" style="grid-column: 11; grid-row: 8;"><div class="color-bar darkblue"></div></div>
                <div class="space right-row" style="grid-column: 11; grid-row: 9;"></div>
                <div class="space right-row" style="grid-column: 11; grid-row: 10;"><div class="color-bar darkblue"></div></div>

                <!-- Bottom Row -->
                <div class="corner" style="grid-column: 1; grid-row: 11;"></div>
                <div class="space bottom-row" style="grid-column: 2;"><div class="color-bar lightblue"></div></div>
                <div class="space bottom-row" style="grid-column: 3;"><div class="color-bar lightblue"></div></div>
                <div class="space bottom-row" style="grid-column: 4;"></div>
                <div class="space bottom-row" style="grid-column: 5;"><div class="color-bar lightblue"></div></div>
                <div class="space bottom-row" style="grid-column: 6;"></div>
                <div class="space bottom-row" style="grid-column: 7;"></div>
                <div class="space bottom-row" style="grid-column: 8;"><div class="color-bar brown"></div></div>
                <div class="space bottom-row" style="grid-column: 9;"></div>
                <div class="space bottom-row" style="grid-column: 10;"><div class="color-bar brown"></div></div>
                <div class="corner" style="grid-column: 11; grid-row: 11;"></div>

                <!-- Center Interface -->
                <div class="center">
                    <div class="ui-panel">
                        <h2>X The Game</h2>
                        <div class="subtitle">Fluid Mandelbrot Engine</div>
                        <button id="zoom-out-btn" onclick="ascend()" disabled>Ascend</button>
                        <div id="layer-counter">Depth: 1.0e0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const camera = document.getElementById('camera');
        const vignette = document.getElementById('vignette');

        let currentLayer = document.getElementById('active-layer');
        let currentBoard = document.getElementById('active-board');

        // Configuration
        const S = 35; // The exponential scale factor per zoom
        const animDuration = 2.8; // Seconds
        let depthLevel = 0;
        let isAnimating = false;

        function bindSpaces(boardElement) {
            const spaces = boardElement.querySelectorAll('.space, .corner');
            spaces.forEach(space => {
                space.addEventListener('click', function(e) {
                    if (isAnimating) return;
                    isAnimating = true;

                    // 1. Get exact pixel center of the clicked space
                    const rect = this.getBoundingClientRect();
                    const clickX = rect.left + rect.width / 2;
                    const clickY = rect.top + rect.height / 2;

                    // Center of the screen (the Camera flex center)
                    const w2 = window.innerWidth / 2;
                    const h2 = window.innerHeight / 2;

                    // Vector distance from screen center to the clicked square
                    const dx = clickX - w2;
                    const dy = clickY - h2;

                    // Highlight the square we are diving into
                    this.style.boxShadow = "inset 0 0 80px rgba(0, 210, 255, 0.8)";
                    this.style.backgroundColor = "#fff";

                    // 2. Setup the New Dimension
                    const nextLayer = document.createElement('div');
                    nextLayer.className = 'layer';
                    const newBoard = currentBoard.cloneNode(true);

                    // MATHEMATICAL TRICK: Place the new board exactly at the click vector, scaled down exponentially.
                    newBoard.style.transform = `translate(${dx}px, ${dy}px) scale(${1 / S})`;
                    newBoard.style.opacity = '0';
                    nextLayer.appendChild(newBoard);
                    camera.appendChild(nextLayer);

                    void camera.offsetWidth; // Force browser render

                    // 3. The Mandelbrot Dive
                    vignette.style.opacity = '1';

                    // Animate the Camera. 
                    // By translating oppositely scaled by S, the clicked point smoothly slides to the exact center of the screen as it scales up.
                    camera.style.transition = `transform ${animDuration}s cubic-bezier(0.65, 0, 0.35, 1)`;
                    camera.style.transform = `translate(${-dx * S}px, ${-dy * S}px) scale(${S})`;

                    // Crossfade the dimensions
                    currentBoard.style.transition = `opacity ${animDuration * 0.8}s ease-in`;
                    currentBoard.style.opacity = '0';

                    newBoard.style.transition = `opacity ${animDuration * 0.7}s ease-out ${animDuration * 0.3}s`;
                    newBoard.style.opacity = '1';

                    // 4. Seamless State Reset
                    setTimeout(() => {
                        currentLayer.remove(); // Delete old universe

                        // Instantly zero out the camera transforms (no visible change due to the math resolving to 0,0)
                        camera.style.transition = 'none';
                        camera.style.transform = 'translate(0px, 0px) scale(1)';

                        // New board becomes the primary visual anchor
                        newBoard.style.transition = 'none';
                        newBoard.style.transform = 'translate(0px, 0px) scale(1)';

                        // Update app state
                        currentLayer = nextLayer;
                        currentBoard = newBoard;
                        bindSpaces(currentBoard);

                        depthLevel++;
                        updateUI();

                        vignette.style.opacity = '0';
                        isAnimating = false;
                    }, animDuration * 1000); 
                });
            });
        }

        bindSpaces(currentBoard);

        function ascend() {
            if (isAnimating || depthLevel <= 0) return;
            isAnimating = true;

            const prevLayer = document.createElement('div');
            prevLayer.className = 'layer';
            const prevBoard = currentBoard.cloneNode(true);

            // To zoom out, we place the previous universe massive and centered
            prevBoard.style.transform = `translate(0px, 0px) scale(${S})`;
            prevBoard.style.opacity = '0';
            prevLayer.appendChild(prevBoard);
            camera.insertBefore(prevLayer, currentLayer); 

            void camera.offsetWidth;

            // Camera shrinks inward
            camera.style.transition = `transform ${animDuration}s cubic-bezier(0.65, 0, 0.35, 1)`;
            camera.style.transform = `translate(0px, 0px) scale(${1 / S})`;

            currentBoard.style.transition = `opacity ${animDuration * 0.8}s ease-in`;
            currentBoard.style.opacity = '0';

            prevBoard.style.transition = `opacity ${animDuration * 0.7}s ease-out ${animDuration * 0.3}s`;
            prevBoard.style.opacity = '1';

            vignette.style.opacity = '1';

            setTimeout(() => {
                currentLayer.remove();

                camera.style.transition = 'none';
                camera.style.transform = 'translate(0px, 0px) scale(1)';

                prevBoard.style.transition = 'none';
                prevBoard.style.transform = 'translate(0px, 0px) scale(1)';

                currentLayer = prevLayer;
                currentBoard = prevBoard;
                bindSpaces(currentBoard);

                depthLevel--;
                updateUI();

                vignette.style.opacity = '0';
                isAnimating = false;
            }, animDuration * 1000);
        }

        function updateUI() {
            const depthDisplay = Math.pow(10, depthLevel).toExponential(1);

            const activeCounters = currentBoard.querySelectorAll('#layer-counter');
            const activeBtns = currentBoard.querySelectorAll('#zoom-out-btn');

            activeCounters.forEach(c => c.innerText = `Depth: ${depthDisplay}`);
            activeBtns.forEach(b => b.disabled = depthLevel === 0);
        }
    </script>
</body>
</html>
